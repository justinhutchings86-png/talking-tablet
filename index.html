<script>

/* EXPANDED ICONS */
const icons = [

/* FOOD */
"🍕","🍔","🍟","🍗","🍖","🌭","🥪","🌮","🌯","🍝","🍜","🍣","🍩","🍪","🍰","🧁","🍎","🍌","🍇","🍉",

/* DRINKS */
"🥤","🧃","🥛","☕","🧋","🍺","🍷","💧",

/* FEELINGS */
"😊","😡","😭","😴","🤢","🤕","😃","😞","😠","😎",

/* ACTIVITIES */
"📱","🎮","📺","🎵","⚽","🏀","🚗","🚌","🏠","🏫",

/* ACTIONS */
"➕","➕➕","✔️","❌","⬅️","➡️","⬆️","⬇️"

];

/* IMAGE LIBRARY (AAC STYLE) */
const imageList = [
"https://cdn-icons-png.flaticon.com/512/1046/1046784.png", // burger
"https://cdn-icons-png.flaticon.com/512/1046/1046771.png", // fries
"https://cdn-icons-png.flaticon.com/512/1046/1046769.png", // pizza
"https://cdn-icons-png.flaticon.com/512/3075/3075978.png", // nuggets
"https://cdn-icons-png.flaticon.com/512/1046/1046786.png", // chicken
"https://cdn-icons-png.flaticon.com/512/1046/1046792.png", // sandwich
"https://cdn-icons-png.flaticon.com/512/1046/1046795.png", // drink
"https://cdn-icons-png.flaticon.com/512/1046/1046781.png"  // milk
];

/* UPDATED PICKER */
function openPicker(callback) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    // EMOJIS
    icons.forEach(icon => {
        const el = document.createElement("div");
        el.innerText = icon;
        el.style.fontSize = "40px";
        el.style.textAlign = "center";
        el.style.cursor = "pointer";

        el.onclick = () => {
            callback({ emoji: icon });
            closePicker();
        };

        grid.appendChild(el);
    });

    // IMAGES
    imageList.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.style.width = "60px";
        img.style.cursor = "pointer";

        img.onclick = () => {
            callback({ image: src });
            closePicker();
        };

        grid.appendChild(img);
    });

    document.getElementById("picker").style.display = "block";
}

/* UPDATED EDIT */
function editButton(index) {
    const btn = screens[currentScreen][index];

    btn.label = prompt("Label:", btn.label) || btn.label;
    btn.speech = prompt("Speech:", btn.speech || "") || btn.speech;

    const c = prompt("1=icons  2=letter  3=image");

    if (c === "1") {
        openPicker((data) => {
            if (data.emoji) {
                btn.emoji = data.emoji;
                delete btn.image;
                delete btn.iconText;
            }
            if (data.image) {
                btn.image = data.image;
                delete btn.emoji;
                delete btn.iconText;
            }

            save();
            renderScreen();
        });
    }

    else if (c === "2") {
        btn.iconText = prompt("Letter:", "M");
        btn.iconColor = prompt("Color:", "yellow");
        delete btn.image;
        delete btn.emoji;
        save();
        renderScreen();
    }

    else if (c === "3") {
        window.editTarget = btn;
        document.getElementById("upload").click();
    }
}

</script>
</body>
</html>
