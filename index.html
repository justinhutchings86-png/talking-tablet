<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talking Tablet</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #eef1f5;
}

.topbar {
    height: 60px;
    background: #ffffff;
    display: flex;
    align-items: center;
    padding: 0 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 1000;
}

.menuBtn {
    font-size: 26px;
    cursor: pointer;
}

.title {
    margin-left: 15px;
    font-weight: 600;
    font-size: 18px;
}

.dropdown {
    position: fixed;
    top: 60px;
    left: 10px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    display: none;
}

.dropdown div {
    padding: 12px 20px;
    cursor: pointer;
}

.dropdown div:hover {
    background: #f2f2f2;
}

.grid {
    display: grid;
    gap: 15px;
    padding: 80px 15px 15px;
}

.normal {
    grid-template-columns: repeat(3, 1fr);
}

.big {
    grid-template-columns: repeat(2, 1fr);
}

.button {
    border-radius: 18px;
    padding: 20px;
    text-align: center;
    color: white;
    font-weight: 500;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.emoji {
    font-size: 55px;
}

.label {
    margin-top: 10px;
    font-size: 18px;
}

/* COLORS */
.home { background: #6c757d; }
.food { background: #ff8c42; }
.drinks { background: #4dabf7; }
.help { background: #fa5252; }
.hurt { background: #e03131; }
.play { background: #51cf66; }

</style>
</head>

<body>

<div class="topbar">
    <div class="menuBtn" onclick="toggleMenu()">⚙️</div>
    <div class="title">Talking Tablet</div>
</div>

<div id="dropdown" class="dropdown">
    <div onclick="toggleEdit()">Toggle Edit Mode</div>
    <div onclick="changePin()">Change PIN</div>
    <div onclick="resetApp()">Reset to Default</div>
    <div onclick="toggleSize()">Toggle Button Size</div>
    <div onclick="toggleVoice()">Voice: Male/Female</div>
</div>

<div id="app" class="grid"></div>

<script>

let PASSWORD = localStorage.getItem("aacPin") || "1234";
let editMode = false;
let currentScreen = "home";
let sizeMode = localStorage.getItem("sizeMode") || "normal";
let voiceType = localStorage.getItem("voiceType") || "female";

/* DATA (same as before, shortened here for clarity) */
const defaultScreens = {
home: [
    { label: "Drink", action: "drinks", emoji: "🥤" },
    { label: "Eat", action: "food", emoji: "🍎" },
    { label: "Help", action: "help", emoji: "🆘" },

    { label: "Bathroom", speech: "I need the bathroom", emoji: "🚽" },
    { label: "Play", action: "play", emoji: "🎮" },
    { label: "More", speech: "I want more", emoji: "➕" },

    { label: "All Done", speech: "I am all done", emoji: "✔️" },
    { label: "Happy", speech: "I feel happy", emoji: "😊" },
    { label: "Mad", speech: "I feel mad", emoji: "😡" }
],

food: [
    { label: "Pizza", speech: "I want pizza", emoji: "🍕" },
    { label: "Burger", speech: "I want a burger", emoji: "🍔" },
    { label: "Fries", speech: "I want fries", emoji: "🍟" },
    { label: "Back", action: "home", emoji: "⬅️" }
],

drinks: [
    { label: "Water", speech: "I want water", emoji: "💧" },
    { label: "Juice", speech: "I want juice", emoji: "🧃" },
    { label: "Milk", speech: "I want milk", emoji: "🥛" },
    { label: "Back", action: "home", emoji: "⬅️" }
],

help: [
    { label: "I Hurt", action: "hurt", emoji: "🤕" },
    { label: "I'm Sick", speech: "I feel sick", emoji: "🤢" },
    { label: "Back", action: "home", emoji: "⬅️" }
],

hurt: [
    { label: "Head", speech: "My head hurts", emoji: "🤕" },
    { label: "Tummy", speech: "My tummy hurts", emoji: "🤢" },
    { label: "Back", action: "help", emoji: "⬅️" }
],

play: [
    { label: "iPad", speech: "I want the iPad", emoji: "📱" },
    { label: "Toys", speech: "I want toys", emoji: "🧸" },
    { label: "Back", action: "home", emoji: "⬅️" }
]
};

let screens = JSON.parse(localStorage.getItem("aacData")) || defaultScreens;

const app = document.getElementById("app");
const dropdown = document.getElementById("dropdown");

function toggleMenu() {
    dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
}

function renderScreen() {
    app.className = "grid " + sizeMode;
    app.innerHTML = "";

    screens[currentScreen].forEach((btn, index) => {
        const div = document.createElement("div");
        div.className = "button " + currentScreen;

        div.innerHTML = `
            <div class="emoji">${btn.emoji}</div>
            <div class="label">${btn.label}</div>
        `;

        div.onclick = () => {
            if (btn.action) {
                currentScreen = btn.action;
                renderScreen();
            } else {
                speak(btn.speech);
            }
        };

        app.appendChild(div);
    });
}

/* SIMPLE VOICE SWITCH */
function speak(text) {
    const utterance = new SpeechSynthesisUtterance(text);
    const voices = speechSynthesis.getVoices();

    let voice = voices.find(v =>
        voiceType === "male"
            ? v.name.toLowerCase().includes("male")
            : v.name.toLowerCase().includes("female")
    );

    if (voice) utterance.voice = voice;

    speechSynthesis.speak(utterance);
}

function toggleVoice() {
    voiceType = voiceType === "male" ? "female" : "male";
    localStorage.setItem("voiceType", voiceType);
    alert("Voice set to " + voiceType);
}

/* OTHER FUNCTIONS (unchanged) */
function toggleSize() {
    sizeMode = sizeMode === "normal" ? "big" : "normal";
    localStorage.setItem("sizeMode", sizeMode);
    renderScreen();
}

function toggleEdit() {
    const pass = prompt("Enter PIN:");
    if (pass === PASSWORD) editMode = !editMode;
}

function changePin() {
    const current = prompt("Enter current PIN:");
    if (current !== PASSWORD) return;
    const newPin = prompt("Enter new PIN:");
    if (newPin) {
        PASSWORD = newPin;
        localStorage.setItem("aacPin", newPin);
    }
}

function resetApp() {
    const pass = prompt("Enter PIN to reset:");
    if (pass !== PASSWORD) return;
    localStorage.removeItem("aacData");
    location.reload();
}

renderScreen();

</script>

</body>
</html>
