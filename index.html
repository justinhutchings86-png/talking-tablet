<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talking Tablet</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #eef1f5;
}

/* TOP BAR */
.topbar {
    height: 60px;
    background: #ffffff;
    display: flex;
    align-items: center;
    padding: 0 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 1000;
}

.menuBtn {
    font-size: 26px;
    cursor: pointer;
}

.title {
    margin-left: 15px;
    font-weight: 600;
    font-size: 18px;
}

/* DROPDOWN */
.dropdown {
    position: fixed;
    top: 60px;
    left: 10px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    display: none;
    overflow: hidden;
}

.dropdown div {
    padding: 12px 20px;
    cursor: pointer;
}

.dropdown div:hover {
    background: #f2f2f2;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding: 80px 15px 15px;
}

/* BUTTON */
.button {
    background: white;
    border-radius: 18px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    transition: transform 0.1s ease;
}

.button:active {
    transform: scale(0.95);
}

.emoji {
    font-size: 55px;
}

.label {
    margin-top: 10px;
    font-size: 18px;
    font-weight: 500;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="menuBtn" onclick="toggleMenu()">⚙️</div>
    <div class="title">Talking Tablet</div>
</div>

<div id="dropdown" class="dropdown">
    <div onclick="toggleEdit()">Toggle Edit Mode</div>
    <div onclick="changePin()">Change PIN</div>
    <div onclick="resetApp()">Reset to Default</div>
</div>

<div id="app" class="grid"></div>

<script>

let PASSWORD = localStorage.getItem("aacPin") || "1234";
let editMode = false;
let currentScreen = "home";

/* DATA */
const defaultScreens = {

home: [
    { label: "Drink", action: "drinks", emoji: "🥤" },
    { label: "Eat", action: "food", emoji: "🍎" },
    { label: "Help", action: "help", emoji: "🆘" },

    { label: "Bathroom", speech: "I need the bathroom", emoji: "🚽" },
    { label: "Play", action: "play", emoji: "🎮" },
    { label: "More", speech: "I want more", emoji: "➕" },

    { label: "All Done", speech: "I am all done", emoji: "✔️" },
    { label: "Happy", speech: "I feel happy", emoji: "😊" },
    { label: "Mad", speech: "I feel mad", emoji: "😡" }
],

food: [
    { label: "Pizza", speech: "I want pizza", emoji: "🍕" },
    { label: "Burger", speech: "I want a burger", emoji: "🍔" },
    { label: "Fries", speech: "I want fries", emoji: "🍟" },

    { label: "Apple", speech: "I want an apple", emoji: "🍎" },
    { label: "Banana", speech: "I want a banana", emoji: "🍌" },
    { label: "Sandwich", speech: "I want a sandwich", emoji: "🥪" },

    { label: "Snack", speech: "I want a snack", emoji: "🍪" },
    { label: "Candy", speech: "I want candy", emoji: "🍬" },

    { label: "Back", action: "home", emoji: "⬅️" }
],

drinks: [
    { label: "Water", speech: "I want water", emoji: "💧" },
    { label: "Juice", speech: "I want juice", emoji: "🧃" },
    { label: "Milk", speech: "I want milk", emoji: "🥛" },

    { label: "Chocolate Milk", speech: "I want chocolate milk", emoji: "🍫🥛" },
    { label: "Soda", speech: "I want soda", emoji: "🥤" },
    { label: "Sports Drink", speech: "I want a sports drink", emoji: "🥤" },

    { label: "Back", action: "home", emoji: "⬅️" }
],

help: [
    { label: "I Hurt", action: "hurt", emoji: "🤕" },
    { label: "I'm Sick", speech: "I feel sick", emoji: "🤢" },
    { label: "Medicine", speech: "I need medicine", emoji: "💊" },

    { label: "Tired", speech: "I am tired", emoji: "😴" },

    { label: "Back", action: "home", emoji: "⬅️" }
],

hurt: [
    { label: "Tummy", speech: "My tummy hurts", emoji: "🤢" },
    { label: "Head", speech: "My head hurts", emoji: "🤕" },
    { label: "Leg", speech: "My leg hurts", emoji: "🦵" },

    { label: "Arm", speech: "My arm hurts", emoji: "💪" },
    { label: "Tooth", speech: "My tooth hurts", emoji: "🦷" },
    { label: "Throat", speech: "My throat hurts", emoji: "😷" },

    { label: "Back", action: "help", emoji: "⬅️" }
],

play: [
    { label: "iPad", speech: "I want the iPad", emoji: "📱" },
    { label: "Toys", speech: "I want toys", emoji: "🧸" },
    { label: "Outside", speech: "I want outside", emoji: "🌳" },

    { label: "TV", speech: "I want TV", emoji: "📺" },
    { label: "Music", speech: "I want music", emoji: "🎵" },

    { label: "Back", action: "home", emoji: "⬅️" }
]

};

let screens = JSON.parse(localStorage.getItem("aacData")) || defaultScreens;

const app = document.getElementById("app");
const dropdown = document.getElementById("dropdown");

/* MENU */
function toggleMenu() {
    dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
}

/* RENDER */
function renderScreen() {
    app.innerHTML = "";

    screens[currentScreen].forEach((btn, index) => {
        const div = document.createElement("div");
        div.className = "button";

        div.innerHTML = `
            <div class="emoji">${btn.emoji}</div>
            <div class="label">${btn.label}</div>
        `;

        div.onclick = () => {
            if (btn.action) {
                currentScreen = btn.action;
                renderScreen();
            } else {
                speak(btn.speech);
            }
        };

        let pressTimer;

        div.addEventListener("touchstart", () => {
            if (!editMode) return;
            pressTimer = setTimeout(() => editButton(currentScreen, index), 600);
        });

        div.addEventListener("touchend", () => clearTimeout(pressTimer));

        app.appendChild(div);
    });
}

/* SPEECH */
function speak(text) {
    speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

/* EDIT */
function editButton(screen, index) {
    const btn = screens[screen][index];

    const newLabel = prompt("Label:", btn.label);
    if (newLabel !== null) btn.label = newLabel;

    const newSpeech = prompt("Speech:", btn.speech || "");
    if (newSpeech !== null) btn.speech = newSpeech;

    const newEmoji = prompt("Emoji:", btn.emoji);
    if (newEmoji) btn.emoji = newEmoji;

    saveData();
    renderScreen();
}

/* PIN */
function toggleEdit() {
    const pass = prompt("Enter PIN:");
    if (pass === PASSWORD) {
        editMode = !editMode;
        alert(editMode ? "Edit Mode ON" : "Edit Mode OFF");
    } else {
        alert("Wrong PIN");
    }
}

function changePin() {
    const current = prompt("Enter current PIN:");
    if (current !== PASSWORD) return alert("Wrong PIN");

    const newPin = prompt("Enter new PIN:");
    if (newPin) {
        PASSWORD = newPin;
        localStorage.setItem("aacPin", newPin);
        alert("PIN Updated");
    }
}

/* RESET */
function resetApp() {
    const pass = prompt("Enter PIN to reset:");
    if (pass !== PASSWORD) return alert("Wrong PIN");

    if (confirm("This will erase all changes. Continue?")) {
        localStorage.removeItem("aacData");
        alert("Reset complete");
        location.reload();
    }
}

/* SAVE */
function saveData() {
    localStorage.setItem("aacData", JSON.stringify(screens));
}

/* START */
renderScreen();

</script>

</body>
</html>
