<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talking Tablet V2</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* SETTINGS MENU */
#menuBtn {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 30px;
    cursor: pointer;
    z-index: 1000;
}

#dropdown {
    position: fixed;
    top: 50px;
    left: 10px;
    background: white;
    border: 1px solid #ccc;
    border-radius: 8px;
    display: none;
    z-index: 1000;
}

#dropdown div {
    padding: 10px;
    cursor: pointer;
}

#dropdown div:hover {
    background: #eee;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 60px 10px 10px;
    height: 100vh;
    box-sizing: border-box;
}

.button {
    background: white;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    border: 2px solid #ddd;
}

.emoji {
    font-size: 50px;
}

.label {
    margin-top: 8px;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="menuBtn">⚙️</div>

<div id="dropdown">
    <div onclick="toggleEdit()">Toggle Edit Mode</div>
    <div onclick="changePin()">Change PIN</div>
</div>

<div id="app" class="grid"></div>

<script>

let PASSWORD = localStorage.getItem("aacPin") || "1234";
let editMode = false;
let currentScreen = "home";

const defaultScreens = {
    home: [
        { label: "Drink", action: "drinks", emoji: "🥤" },
        { label: "Eat", action: "food", emoji: "🍎" },
        { label: "Help", speech: "I need help", emoji: "🆘" },

        { label: "Bathroom", speech: "I need the bathroom", emoji: "🚽" },
        { label: "Play", action: "play", emoji: "🎮" },
        { label: "More", speech: "I want more", emoji: "➕" },

        { label: "All Done", speech: "I am all done", emoji: "✔️" },
        { label: "Happy", speech: "I feel happy", emoji: "😊" },
        { label: "Mad", speech: "I feel mad", emoji: "😡" }
    ],

    food: [
        { label: "Chicken", speech: "I want chicken", emoji: "🍗" },
        { label: "Pizza", speech: "I want pizza", emoji: "🍕" },
        { label: "Noodles", speech: "I want noodles", emoji: "🍜" },

        { label: "Candy", speech: "I want candy", emoji: "🍬" },
        { label: "Snack", speech: "I want a snack", emoji: "🍪" },

        { label: "Back", action: "home", emoji: "⬅️" }
    ],

    drinks: [
        { label: "Soda", speech: "I want soda", emoji: "🥤" },
        { label: "Juice", speech: "I want juice", emoji: "🧃" },
        { label: "Milk", speech: "I want milk", emoji: "🥛" },

        { label: "Chocolate Milk", speech: "I want chocolate milk", emoji: "🍫🥛" },
        { label: "Water", speech: "I want water", emoji: "💧" },

        { label: "Back", action: "home", emoji: "⬅️" }
    ],

    play: [
        { label: "iPad", speech: "I want the iPad", emoji: "📱" },
        { label: "Toys", speech: "I want toys", emoji: "🧸" },
        { label: "Outside", speech: "I want outside", emoji: "🌳" },

        { label: "TV", speech: "I want TV", emoji: "📺" },
        { label: "Music", speech: "I want music", emoji: "🎵" },

        { label: "Back", action: "home", emoji: "⬅️" }
    ]
};

let screens = JSON.parse(localStorage.getItem("aacData")) || defaultScreens;

const app = document.getElementById("app");
const menuBtn = document.getElementById("menuBtn");
const dropdown = document.getElementById("dropdown");

menuBtn.onclick = () => {
    dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
};

// RENDER
function renderScreen() {
    app.innerHTML = "";

    screens[currentScreen].forEach((btn, index) => {
        const div = document.createElement("div");
        div.className = "button";

        const emoji = document.createElement("div");
        emoji.className = "emoji";
        emoji.textContent = btn.emoji;

        const label = document.createElement("div");
        label.className = "label";
        label.innerText = btn.label;

        div.appendChild(emoji);
        div.appendChild(label);

        div.onclick = () => {
            if (btn.action) {
                currentScreen = btn.action;
                renderScreen();
            } else {
                speak(btn.speech);
            }
        };

        let pressTimer;

        function startPress() {
            if (!editMode) return;
            pressTimer = setTimeout(() => {
                editButton(currentScreen, index);
            }, 600);
        }

        function endPress() {
            clearTimeout(pressTimer);
        }

        div.addEventListener("mousedown", startPress);
        div.addEventListener("mouseup", endPress);
        div.addEventListener("mouseleave", endPress);

        div.addEventListener("touchstart", startPress);
        div.addEventListener("touchend", endPress);

        app.appendChild(div);
    });
}

// SPEECH
function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(msg);
}

// EDIT
function editButton(screen, index) {
    const btn = screens[screen][index];

    const newLabel = prompt("Label:", btn.label);
    if (newLabel !== null) btn.label = newLabel;

    const newSpeech = prompt("Speech:", btn.speech || "");
    if (newSpeech !== null) btn.speech = newSpeech;

    const newEmoji = prompt("Enter emoji:", btn.emoji);
    if (newEmoji !== null && newEmoji.trim() !== "") {
        btn.emoji = newEmoji;
    }

    saveData();
    renderScreen();
}

// PIN FUNCTIONS
function toggleEdit() {
    const pass = prompt("Enter PIN:");
    if (pass === PASSWORD) {
        editMode = !editMode;
        alert(editMode ? "Edit Mode ON" : "Edit Mode OFF");
    } else {
        alert("Wrong PIN");
    }
}

function changePin() {
    const current = prompt("Enter current PIN:");
    if (current !== PASSWORD) {
        alert("Wrong PIN");
        return;
    }

    const newPin = prompt("Enter new PIN:");
    if (newPin) {
        PASSWORD = newPin;
        localStorage.setItem("aacPin", newPin);
        alert("PIN updated");
    }
}

// SAVE
function saveData() {
    localStorage.setItem("aacData", JSON.stringify(screens));
}

// START
renderScreen();

</script>

</body>
</html>
