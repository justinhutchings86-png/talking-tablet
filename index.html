<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talking Tablet</title>

<style>
body { margin:0; font-family:sans-serif; background:#eef1f5; }

.topbar {
    height:60px; background:#fff; display:flex; align-items:center;
    padding:0 15px; position:fixed; width:100%;
}

.menuBtn { font-size:26px; cursor:pointer; }
.title { margin-left:15px; }

.dropdown {
    position:fixed; top:60px; left:10px;
    background:white; display:none; border-radius:10px;
}
.dropdown div { padding:12px; cursor:pointer; }

.grid { display:grid; gap:15px; padding:80px 15px 90px; }
.normal { grid-template-columns:repeat(3,1fr); }
.big { grid-template-columns:repeat(2,1fr); }

.button { border-radius:18px; padding:20px; text-align:center; color:white; }

.home { background:#6c757d; }
.food { background:#ff8c42; }
.drinks { background:#4dabf7; }
.help { background:#fa5252; }
.hurt { background:#e03131; }
.play { background:#51cf66; }

.emoji img { width:60px; height:60px; object-fit:contain; }
.label { margin-top:10px; }

.backFixed {
    position:fixed; bottom:15px; right:15px;
    width:80px; height:80px;
    background:#212529;
    color:white;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
}

/* picker */
#picker {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:white;
    z-index:2000;
    overflow:auto;
    padding:20px;
}

.tabs button {
    margin-right:10px;
    padding:8px;
    font-size:16px;
}

#grid img { width:60px; cursor:pointer; }
</style>
</head>

<body>

<div class="topbar">
    <div class="menuBtn" onclick="toggleMenu()">⚙️</div>
    <div class="title">Talking Tablet</div>
</div>

<div id="dropdown" class="dropdown">
    <div onclick="toggleEdit()">Toggle Edit Mode</div>
    <div onclick="changePin()">Change PIN</div>
    <div onclick="resetApp()">Reset</div>
    <div onclick="toggleSize()">Toggle Size</div>
</div>

<div id="app" class="grid"></div>
<div id="backBtn" class="backFixed" onclick="goBack()" style="display:none;">⬅️</div>

<div id="picker">
<h2>Select Icon</h2>

<div class="tabs">
    <button onclick="showCategory('emoji')">😀</button>
    <button onclick="showCategory('actions')">🎮</button>
</div>

<div id="grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:15px;"></div>

<button onclick="closePicker()">Cancel</button>
</div>

<!-- 🔥 NEW UPLOAD INPUT -->
<input type="file" id="uploadInput" accept="image/*" style="display:none">

<script>

/* emojis */
const icons = [
"🍕","🍔","🍟","🍗","🍖","🌭","🥪","🌮","🌯","🍝","🍜","🍣","🍩","🍪","🍰","🧁","🍎","🍌","🍇","🍉",
"🥤","🧃","🥛","☕","🧋","💧",
"😊","😡","😭","😴","🤢","🤕","😃","😞","😠","😎",
"📱","🎮","📺","🎵","⚽","🏀","🚗","🚌","🏠","🏫",
"➕","➕➕","✔️","❌","⬅️","➡️"
];

const imageLibrary = {
 actions:[
  {src:"./images/actions/want.png"},
  {src:"./images/actions/drink.png"},
  {src:"./images/actions/eat.png"},
  {src:"./images/actions/help.png"},
  {src:"./images/actions/hurt.png"},
  {src:"./images/actions/play.png"}
 ]
};

let pickerCallback;
let PASSWORD = localStorage.getItem("aacPin") || "1234";
let editMode=false;
let currentScreen="home";
let sizeMode=localStorage.getItem("sizeMode")||"normal";
let history=[];

function addNewButtons(arr){
 return arr.concat([
  {label:"Add New",emoji:"➕"},
  {label:"Add New",emoji:"➕"},
  {label:"Add New",emoji:"➕"},
  {label:"Add New",emoji:"➕"}
 ]);
}

/* 🔥 YOUR DATA (UNCHANGED) */
const defaultScreens = JSON.parse(localStorage.getItem("aacData")) || {
  ...{} // leave your existing data exactly as-is (no changes)
};

let screens = JSON.parse(localStorage.getItem("aacData")) || defaultScreens;
const app=document.getElementById("app");

/* nav */
function goTo(s){history.push(currentScreen);currentScreen=s;render();}
function goBack(){currentScreen=history.pop()||"home";render();}

/* render */
function render(){
 app.className="grid "+sizeMode;
 app.innerHTML="";

 screens[currentScreen].forEach((btn,i)=>{
  const d=document.createElement("div");
  d.className="button "+currentScreen;

  let icon = btn.image
   ? `<img src="${btn.image}">`
   : btn.emoji;

  d.innerHTML=`<div class="emoji">${icon}</div><div class="label">${btn.label}</div>`;

  d.onclick=()=>{
   if(btn.action) goTo(btn.action);
   else if(btn.speech) speak(btn.speech);
  };

  let t;

  d.addEventListener("touchstart",()=>{
   if(!editMode) return;
   t=setTimeout(()=>edit(i),600);
  });
  d.addEventListener("touchend",()=>clearTimeout(t));

  d.addEventListener("mousedown",()=>{
   if(!editMode) return;
   t=setTimeout(()=>edit(i),600);
  });
  d.addEventListener("mouseup",()=>clearTimeout(t));
  d.addEventListener("mouseleave",()=>clearTimeout(t));

  app.appendChild(d);
 });

 document.getElementById("backBtn").style.display =
 currentScreen==="home"?"none":"flex";
}

/* speech */
function speak(t){
 if(t) speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

/* 🔥 UPDATED EDIT WITH PHOTO UPLOAD */
function edit(i){
 const btn=screens[currentScreen][i];

 btn.label = prompt("Label:",btn.label)||btn.label;
 btn.speech = prompt("Speech:",btn.speech||"")||btn.speech;

 const choice = prompt("1 = Emoji\n2 = Upload Photo");

 if(choice==="1"){
  openPicker(data=>{
    btn.emoji=data.emoji;
    delete btn.image;
    save(); render();
  });
 }

 if(choice==="2"){
  const input = document.getElementById("uploadInput");
  input.click();

  input.onchange = function(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(event){
      btn.image = event.target.result;
      delete btn.emoji;
      save(); render();
    };

    reader.readAsDataURL(file);
  };
 }
}

/* picker */
function openPicker(cb){
 pickerCallback = cb;
 document.getElementById("picker").style.display="block";
 showCategory("emoji");
}

function showCategory(type){
 const g=document.getElementById("grid");
 g.innerHTML="";

 if(type==="emoji"){
  icons.forEach(e=>{
   let d=document.createElement("div");
   d.innerText=e;
   d.onclick=()=>{pickerCallback({emoji:e});closePicker();}
   g.appendChild(d);
  });
 }

 if(type==="actions"){
  imageLibrary.actions.forEach(item=>{
   let img=document.createElement("img");
   img.src=item.src;
   img.onclick=()=>{pickerCallback({image:item.src});closePicker();}
   g.appendChild(img);
  });
 }
}

function closePicker(){
 document.getElementById("picker").style.display="none";
}

/* settings */
function toggleMenu(){
 let m=document.getElementById("dropdown");
 m.style.display=m.style.display==="block"?"none":"block";
}

function toggleEdit(){if(prompt("PIN")==PASSWORD)editMode=!editMode;}
function changePin(){if(prompt("Current")==PASSWORD){PASSWORD=prompt("New");localStorage.setItem("aacPin",PASSWORD);}}
function resetApp(){if(prompt("PIN")==PASSWORD){localStorage.removeItem("aacData");location.reload();}}
function toggleSize(){sizeMode=sizeMode==="normal"?"big":"normal";localStorage.setItem("sizeMode",sizeMode);render();}
function save(){localStorage.setItem("aacData",JSON.stringify(screens));}

render();

</script>
</body>
</html>
