<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talking Tablet</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #eef1f5;
}

.topbar {
    height: 60px;
    background: #ffffff;
    display: flex;
    align-items: center;
    padding: 0 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    position: fixed;
    width: 100%;
    top: 0;
}

.menuBtn { font-size: 26px; cursor: pointer; }
.title { margin-left: 15px; font-weight: 600; }

.dropdown {
    position: fixed;
    top: 60px;
    left: 10px;
    background: white;
    border-radius: 10px;
    display: none;
}

.dropdown div {
    padding: 12px;
    cursor: pointer;
}

.grid {
    display: grid;
    gap: 15px;
    padding: 80px 15px 90px;
}

.normal { grid-template-columns: repeat(3, 1fr); }
.big { grid-template-columns: repeat(2, 1fr); }

.button {
    border-radius: 18px;
    padding: 20px;
    text-align: center;
    color: white;
}

.home { background: #6c757d; }
.food { background: #ff8c42; }
.drinks { background: #4dabf7; }
.help { background: #fa5252; }
.hurt { background: #e03131; }
.play { background: #51cf66; }

.emoji { font-size: 55px; }
.label { margin-top: 10px; }

.backFixed {
    position: fixed;
    bottom: 15px;
    right: 15px;
    width: 80px;
    height: 80px;
    background: #212529;
    color: white;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
}

/* PICKER */
#picker {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    z-index:2000;
    overflow:auto;
    padding:20px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="menuBtn" onclick="toggleMenu()">⚙️</div>
    <div class="title">Talking Tablet</div>
</div>

<div id="dropdown" class="dropdown">
    <div onclick="toggleEdit()">Toggle Edit Mode</div>
    <div onclick="changePin()">Change PIN</div>
    <div onclick="resetApp()">Reset to Default</div>
    <div onclick="toggleSize()">Toggle Button Size</div>
</div>

<div id="app" class="grid"></div>
<div id="backBtn" class="backFixed" onclick="goBack()" style="display:none;">⬅️</div>

<!-- PICKER -->
<div id="picker">
<h2>Select Icon</h2>
<div id="grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:15px;"></div>
<button onclick="closePicker()">Cancel</button>
</div>

<script>

/* EMOJIS */
const icons = [
"🍕","🍔","🍟","🍗","🍖","🌭","🥪","🌮","🌯","🍝","🍜","🍣","🍩","🍪","🍰","🧁","🍎","🍌","🍇","🍉",
"🥤","🧃","🥛","☕","🧋","💧",
"😊","😡","😭","😴","🤢","🤕","😃","😞","😠","😎",
"📱","🎮","📺","🎵","⚽","🏀","🚗","🚌","🏠","🏫",
"➕","➕➕","✔️","❌","⬅️","➡️"
];

/* 🔥 IMAGE LIBRARY (ADD YOUR FILES HERE) */
const imageLibrary = {
    food: [],
    drinks: [],
    actions: [],
    custom: []
};

/* EXAMPLES (add real images later)
imageLibrary.food.push({ src:"images/food/pizza.png" });
*/

let PASSWORD = localStorage.getItem("aacPin") || "1234";
let editMode = false;
let currentScreen = "home";
let sizeMode = localStorage.getItem("sizeMode") || "normal";
let history = [];

function addNewButtons(arr) {
    return arr.concat([
        { label: "Add New", emoji: "➕" },
        { label: "Add New", emoji: "➕" },
        { label: "Add New", emoji: "➕" },
        { label: "Add New", emoji: "➕" }
    ]);
}

/* DATA (UNCHANGED) */
const defaultScreens = {

home: addNewButtons([
    { label: "Drink", action: "drinks", emoji: "🥤" },
    { label: "Eat", action: "food", emoji: "🍎" },
    { label: "Help", action: "help", emoji: "🆘" },
    { label: "Bathroom", speech: "I need the bathroom", emoji: "🚽" },
    { label: "Play", action: "play", emoji: "🎮" },
    { label: "More Please", speech: "I want more please", emoji: "➕➕" },
    { label: "All Done", speech: "I am all done", emoji: "✔️" },
    { label: "Happy", speech: "I feel happy", emoji: "😊" },
    { label: "Mad", speech: "I feel mad", emoji: "😡" }
]),

food: addNewButtons([
    { label: "Pizza", speech: "I want pizza", emoji: "🍕" },
    { label: "Burger", speech: "I want a burger", emoji: "🍔" },
    { label: "Fries", speech: "I want fries", emoji: "🍟" }
]),

drinks: addNewButtons([
    { label: "Water", speech: "I want water", emoji: "💧" },
    { label: "Juice", speech: "I want juice", emoji: "🧃" }
]),

help: addNewButtons([
    { label: "I Hurt", action: "hurt", emoji: "🤕" },
    { label: "I'm Sick", speech: "I feel sick", emoji: "🤢" }
]),

hurt: [
    { label: "Head", speech: "My head hurts", emoji: "🤕" },
    { label: "Tummy", speech: "My tummy hurts", emoji: "🤢" }
],

play: addNewButtons([
    { label: "iPad", speech: "I want the iPad", emoji: "📱" }
])

};

let screens = JSON.parse(localStorage.getItem("aacData")) || defaultScreens;
const app = document.getElementById("app");

/* NAV */
function goTo(screen){ history.push(currentScreen); currentScreen=screen; renderScreen();}
function goBack(){ currentScreen=history.pop()||"home"; renderScreen();}

/* RENDER */
function renderScreen(){
    app.className="grid "+sizeMode;
    app.innerHTML="";

    screens[currentScreen].forEach((btn,index)=>{
        const div=document.createElement("div");
        div.className="button "+currentScreen;

        let icon = btn.image
            ? `<img src="${btn.image}" style="width:60px">`
            : btn.emoji;

        div.innerHTML=`<div class="emoji">${icon}</div><div class="label">${btn.label}</div>`;

        div.onclick=()=>{
            if(btn.action) goTo(btn.action);
            else if(btn.speech) speak(btn.speech);
        };

        let t;
        div.addEventListener("touchstart",()=>{
            if(!editMode) return;
            t=setTimeout(()=>editButton(index),600);
        });

        div.addEventListener("touchend",()=>clearTimeout(t));

        app.appendChild(div);
    });

    document.getElementById("backBtn").style.display =
        currentScreen==="home"?"none":"flex";
}

/* SPEECH */
function speak(t){
    if(t) speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

/* 🔥 FIXED EDIT FUNCTION */
function editButton(index){
    const btn = screens[currentScreen][index];

    const newLabel = prompt("Label:", btn.label);
    if(newLabel !== null) btn.label = newLabel;

    const newSpeech = prompt("Speech:", btn.speech || "");
    if(newSpeech !== null) btn.speech = newSpeech;

    const choice = prompt("1 = Emoji\n2 = Image");

    if(choice === "1"){
        openPicker((data)=>{
            btn.emoji = data;
            delete btn.image;
            save();
            renderScreen();
        });
    }

    if(choice === "2"){
        openImagePicker((src)=>{
            btn.image = src;
            delete btn.emoji;
            save();
            renderScreen();
        });
    }
}

/* EMOJI PICKER */
function openPicker(cb){
    const g=document.getElementById("grid");
    g.innerHTML="";

    icons.forEach(i=>{
        const d=document.createElement("div");
        d.innerText=i;
        d.style.fontSize="40px";
        d.onclick=()=>{cb(i);closePicker();}
        g.appendChild(d);
    });

    document.getElementById("picker").style.display="block";
}

/* IMAGE PICKER */
function openImagePicker(cb){
    const g=document.getElementById("grid");
    g.innerHTML="";

    Object.values(imageLibrary).flat().forEach(item=>{
        const img=document.createElement("img");
        img.src=item.src;
        img.style.width="60px";
        img.onclick=()=>{cb(item.src);closePicker();}
        g.appendChild(img);
    });

    document.getElementById("picker").style.display="block";
}

function closePicker(){
    document.getElementById("picker").style.display="none";
}

/* SETTINGS */
function toggleMenu(){
    const m=document.getElementById("dropdown");
    m.style.display=m.style.display==="block"?"none":"block";
}

function toggleEdit(){if(prompt("PIN:")==PASSWORD)editMode=!editMode;}
function changePin(){if(prompt("Current")==PASSWORD){PASSWORD=prompt("New");localStorage.setItem("aacPin",PASSWORD);}}
function resetApp(){if(prompt("PIN")==PASSWORD){localStorage.removeItem("aacData");location.reload();}}
function toggleSize(){sizeMode=sizeMode==="normal"?"big":"normal";localStorage.setItem("sizeMode",sizeMode);renderScreen();}
function save(){localStorage.setItem("aacData",JSON.stringify(screens));}

renderScreen();

</script>
</body>
</html>
