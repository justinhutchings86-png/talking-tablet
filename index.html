<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talking Tablet</title>

<style>
body { margin:0; font-family:sans-serif; background:#eef1f5; }

.topbar {
    height:60px; background:#fff; display:flex; align-items:center;
    padding:0 15px; position:fixed; width:100%;
}

.menuBtn { font-size:26px; cursor:pointer; }
.title { margin-left:15px; }

.dropdown {
    position:fixed; top:60px; left:10px;
    background:white; display:none; border-radius:10px;
}
.dropdown div { padding:12px; cursor:pointer; }

.grid {
    display:grid; gap:15px; padding:80px 15px 90px;
}
.normal { grid-template-columns:repeat(3,1fr); }
.big { grid-template-columns:repeat(2,1fr); }

.button {
    border-radius:18px; padding:20px; text-align:center; color:white;
}

.home { background:#6c757d; }
.food { background:#ff8c42; }
.drinks { background:#4dabf7; }
.help { background:#fa5252; }
.hurt { background:#e03131; }
.play { background:#51cf66; }

.emoji { font-size:50px; }
.label { margin-top:10px; }

.backFixed {
    position:fixed; bottom:15px; right:15px;
    width:80px; height:80px; background:#212529;
    color:white; border-radius:20px;
    display:flex; align-items:center; justify-content:center;
    font-size:40px;
}

/* picker */
#picker {
    display:none; position:fixed; top:0; left:0;
    width:100%; height:100%; background:white;
    z-index:2000; overflow:auto; padding:20px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="menuBtn" onclick="toggleMenu()">⚙️</div>
    <div class="title">Talking Tablet</div>
</div>

<div id="dropdown" class="dropdown">
    <div onclick="toggleEdit()">Toggle Edit Mode</div>
    <div onclick="changePin()">Change PIN</div>
    <div onclick="resetApp()">Reset</div>
    <div onclick="toggleSize()">Toggle Size</div>
</div>

<div id="app" class="grid"></div>
<div id="backBtn" class="backFixed" onclick="goBack()" style="display:none;">⬅️</div>

<div id="picker">
<h2>Select</h2>
<div id="grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:15px;"></div>
<button onclick="closePicker()">Cancel</button>
</div>

<script>

/* emojis */
const icons = ["🍕","🍔","🍟","🍗","🍜","🍎","🍌","🥤","🧃","🥛","😊","😡","🤢","🤕","📱","🎮","📺","🎵","➕","✔️"];

/* image structure */
const imageLibrary = {
 food:[], drinks:[], actions:[]
};

/* settings */
let PASSWORD = localStorage.getItem("aacPin") || "1234";
let editMode=false;
let currentScreen="home";
let sizeMode=localStorage.getItem("sizeMode")||"normal";
let history=[];

/* helper */
function addNewButtons(arr){
 return arr.concat([
  {label:"Add New",emoji:"➕"},
  {label:"Add New",emoji:"➕"},
  {label:"Add New",emoji:"➕"},
  {label:"Add New",emoji:"➕"}
 ]);
}

/* DATA (FULL RESTORE) */
const defaultScreens = {

home:addNewButtons([
{label:"Drink",action:"drinks",emoji:"🥤"},
{label:"Eat",action:"food",emoji:"🍎"},
{label:"Help",action:"help",emoji:"🆘"},
{label:"Bathroom",speech:"I need the bathroom",emoji:"🚽"},
{label:"Play",action:"play",emoji:"🎮"},
{label:"More Please",speech:"I want more please",emoji:"➕➕"},
{label:"All Done",speech:"I am all done",emoji:"✔️"},
{label:"Happy",speech:"I feel happy",emoji:"😊"},
{label:"Mad",speech:"I feel mad",emoji:"😡"}
]),

food:addNewButtons([
{label:"Pizza",speech:"I want pizza",emoji:"🍕"},
{label:"Burger",speech:"I want a burger",emoji:"🍔"},
{label:"Fries",speech:"I want fries",emoji:"🍟"},
{label:"Chicken",speech:"I want chicken",emoji:"🍗"},
{label:"Noodles",speech:"I want noodles",emoji:"🍜"},
{label:"Sandwich",speech:"I want a sandwich",emoji:"🥪"},
{label:"Snack",speech:"I want a snack",emoji:"🍪"},
{label:"Candy",speech:"I want candy",emoji:"🍬"},
{label:"Apple",speech:"I want an apple",emoji:"🍎"},
{label:"Banana",speech:"I want a banana",emoji:"🍌"}
]),

drinks:addNewButtons([
{label:"Water",speech:"I want water",emoji:"💧"},
{label:"Juice",speech:"I want juice",emoji:"🧃"},
{label:"Milk",speech:"I want milk",emoji:"🥛"},
{label:"Chocolate Milk",speech:"I want chocolate milk",emoji:"🍫🥛"},
{label:"Soda",speech:"I want soda",emoji:"🥤"}
]),

help:addNewButtons([
{label:"I Hurt",action:"hurt",emoji:"🤕"},
{label:"I'm Sick",speech:"I feel sick",emoji:"🤢"},
{label:"Medicine",speech:"I need medicine",emoji:"💊"},
{label:"Tired",speech:"I am tired",emoji:"😴"},
{label:"Help Me",speech:"I need help",emoji:"🆘"}
]),

hurt:[
{label:"Head",speech:"My head hurts",emoji:"🤕"},
{label:"Tummy",speech:"My tummy hurts",emoji:"🤢"},
{label:"Leg",speech:"My leg hurts",emoji:"🦵"},
{label:"Arm",speech:"My arm hurts",emoji:"💪"},
{label:"Tooth",speech:"My tooth hurts",emoji:"🦷"},
{label:"Throat",speech:"My throat hurts",emoji:"😷"}
],

play:addNewButtons([
{label:"iPad",speech:"I want the iPad",emoji:"📱"},
{label:"Toys",speech:"I want toys",emoji:"🧸"},
{label:"Outside",speech:"I want outside",emoji:"🌳"},
{label:"TV",speech:"I want TV",emoji:"📺"},
{label:"Music",speech:"I want music",emoji:"🎵"}
])
};

let screens = JSON.parse(localStorage.getItem("aacData")) || defaultScreens;
const app=document.getElementById("app");

/* nav */
function goTo(s){history.push(currentScreen);currentScreen=s;render();}
function goBack(){currentScreen=history.pop()||"home";render();}

/* render */
function render(){
 app.className="grid "+sizeMode;
 app.innerHTML="";

 screens[currentScreen].forEach((btn,i)=>{
  const d=document.createElement("div");
  d.className="button "+currentScreen;

  let icon = btn.image
   ? `<img src="${btn.image}" style="width:60px">`
   : btn.emoji;

  d.innerHTML=`<div class="emoji">${icon}</div><div>${btn.label}</div>`;

  d.onclick=()=>{
   if(btn.action) goTo(btn.action);
   else if(btn.speech) speak(btn.speech);
  };

  let t;
  d.addEventListener("touchstart",()=>{
   if(!editMode) return;
   t=setTimeout(()=>edit(i),600);
  });

  d.addEventListener("touchend",()=>clearTimeout(t));

  app.appendChild(d);
 });

 document.getElementById("backBtn").style.display =
 currentScreen==="home"?"none":"flex";
}

/* speech */
function speak(t){ if(t) speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }

/* 🔥 FIXED EDIT */
function edit(i){
 const btn=screens[currentScreen][i];

 btn.label = prompt("Label:",btn.label)||btn.label;
 btn.speech = prompt("Speech:",btn.speech||"")||btn.speech;

 const choice = prompt("1=Emoji\n2=Image");

 if(choice==="1"){
  openEmoji(e=>{
   btn.emoji=e;
   delete btn.image;
   save(); render();
  });
 }

 if(choice==="2"){
  openImage(img=>{
   btn.image=img;
   delete btn.emoji;
   save(); render();
  });
 }
}

/* emoji picker */
function openEmoji(cb){
 const g=document.getElementById("grid");
 g.innerHTML="";
 icons.forEach(e=>{
  let d=document.createElement("div");
  d.innerText=e;
  d.onclick=()=>{cb(e);closePicker();}
  g.appendChild(d);
 });
 document.getElementById("picker").style.display="block";
}

/* image picker */
function openImage(cb){
 const g=document.getElementById("grid");
 g.innerHTML="";
 Object.values(imageLibrary).flat().forEach(i=>{
  let img=document.createElement("img");
  img.src=i.src;
  img.style.width="60px";
  img.onclick=()=>{cb(i.src);closePicker();}
  g.appendChild(img);
 });
 document.getElementById("picker").style.display="block";
}

function closePicker(){document.getElementById("picker").style.display="none";}

/* settings */
function toggleMenu(){
 let m=document.getElementById("dropdown");
 m.style.display=m.style.display==="block"?"none":"block";
}
function toggleEdit(){if(prompt("PIN")==PASSWORD)editMode=!editMode;}
function changePin(){if(prompt("Current")==PASSWORD){PASSWORD=prompt("New");localStorage.setItem("aacPin",PASSWORD);}}
function resetApp(){if(prompt("PIN")==PASSWORD){localStorage.removeItem("aacData");location.reload();}}
function toggleSize(){sizeMode=sizeMode==="normal"?"big":"normal";localStorage.setItem("sizeMode",sizeMode);render();}
function save(){localStorage.setItem("aacData",JSON.stringify(screens));}

render();

</script>
</body>
</html>
