<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talking Tablet</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #eef1f5;
}

.topbar {
    height: 60px;
    background: #ffffff;
    display: flex;
    align-items: center;
    padding: 0 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    position: fixed;
    width: 100%;
    top: 0;
}

.menuBtn { font-size: 26px; cursor: pointer; }
.title { margin-left: 15px; font-weight: 600; }

.dropdown {
    position: fixed;
    top: 60px;
    left: 10px;
    background: white;
    border-radius: 10px;
    display: none;
}

.dropdown div {
    padding: 12px;
    cursor: pointer;
}

.grid {
    display: grid;
    gap: 15px;
    padding: 80px 15px 15px;
}

.normal { grid-template-columns: repeat(3, 1fr); }
.big { grid-template-columns: repeat(2, 1fr); }

.button {
    border-radius: 18px;
    padding: 20px;
    text-align: center;
    color: white;
}

.home { background: #6c757d; }
.food { background: #ff8c42; }
.drinks { background: #4dabf7; }
.help { background: #fa5252; }
.hurt { background: #e03131; }
.play { background: #51cf66; }

.emoji { font-size: 55px; }
.label { margin-top: 10px; }

</style>
</head>

<body>

<div class="topbar">
    <div class="menuBtn" onclick="toggleMenu()">⚙️</div>
    <div class="title">Talking Tablet</div>
</div>

<div id="dropdown" class="dropdown">
    <div onclick="toggleEdit()">Toggle Edit Mode</div>
    <div onclick="changePin()">Change PIN</div>
    <div onclick="resetApp()">Reset to Default</div>
    <div onclick="toggleSize()">Toggle Button Size</div>
</div>

<div id="app" class="grid"></div>

<script>

let PASSWORD = localStorage.getItem("aacPin") || "1234";
let editMode = false;
let currentScreen = "home";
let sizeMode = localStorage.getItem("sizeMode") || "normal";

/* ADD NEW BUTTONS */
function addNewButtons(arr) {
    return arr.concat([
        { label: "Add New", emoji: "➕" },
        { label: "Add New", emoji: "➕" },
        { label: "Add New", emoji: "➕" },
        { label: "Add New", emoji: "➕" }
    ]);
}

/* ORIGINAL DATA + ADD NEW */
const defaultScreens = {

home: addNewButtons([
    { label: "Drink", action: "drinks", emoji: "🥤" },
    { label: "Eat", action: "food", emoji: "🍎" },
    { label: "Help", action: "help", emoji: "🆘" },

    { label: "Bathroom", speech: "I need the bathroom", emoji: "🚽" },
    { label: "Play", action: "play", emoji: "🎮" },
    { label: "More", speech: "I want more", emoji: "➕" },

    { label: "All Done", speech: "I am all done", emoji: "✔️" },
    { label: "Happy", speech: "I feel happy", emoji: "😊" },
    { label: "Mad", speech: "I feel mad", emoji: "😡" }
]),

food: addNewButtons([
    { label: "Pizza", speech: "I want pizza", emoji: "🍕" },
    { label: "Burger", speech: "I want a burger", emoji: "🍔" },
    { label: "Fries", speech: "I want fries", emoji: "🍟" },

    { label: "Apple", speech: "I want an apple", emoji: "🍎" },
    { label: "Chicken", speech: "I want chicken", emoji: "🍗" },
    { label: "Sandwich", speech: "I want a sandwich", emoji: "🥪" },

    { label: "Snack", speech: "I want a snack", emoji: "🍪" },
    { label: "Candy", speech: "I want candy", emoji: "🍬" },

    { label: "Back", action: "home", emoji: "⬅️" }
]),

drinks: addNewButtons([
    { label: "Water", speech: "I want water", emoji: "💧" },
    { label: "Juice", speech: "I want juice", emoji: "🧃" },
    { label: "Milk", speech: "I want milk", emoji: "🥛" },

    { label: "Chocolate Milk", speech: "I want chocolate milk", emoji: "🍫🥛" },
    { label: "Soda", speech: "I want soda", emoji: "🥤" },

    { label: "Back", action: "home", emoji: "⬅️" }
]),

help: addNewButtons([
    { label: "I Hurt", action: "hurt", emoji: "🤕" },
    { label: "I'm Sick", speech: "I feel sick", emoji: "🤢" },
    { label: "Medicine", speech: "I need medicine", emoji: "💊" },

    { label: "Tired", speech: "I am tired", emoji: "😴" },

    { label: "Back", action: "home", emoji: "⬅️" }
]),

hurt: [
    { label: "Tummy", speech: "My tummy hurts", emoji: "🤢" },
    { label: "Head", speech: "My head hurts", emoji: "🤕" },
    { label: "Leg", speech: "My leg hurts", emoji: "🦵" },

    { label: "Arm", speech: "My arm hurts", emoji: "💪" },
    { label: "Tooth", speech: "My tooth hurts", emoji: "🦷" },
    { label: "Throat", speech: "My throat hurts", emoji: "😷" },

    { label: "Back", action: "help", emoji: "⬅️" }
],

play: addNewButtons([
    { label: "iPad", speech: "I want the iPad", emoji: "📱" },
    { label: "Toys", speech: "I want toys", emoji: "🧸" },
    { label: "Outside", speech: "I want outside", emoji: "🌳" },

    { label: "TV", speech: "I want TV", emoji: "📺" },
    { label: "Music", speech: "I want music", emoji: "🎵" },

    { label: "Back", action: "home", emoji: "⬅️" }
])

};

let screens = JSON.parse(localStorage.getItem("aacData")) || defaultScreens;

const app = document.getElementById("app");

/* FIXED MENU */
function toggleMenu() {
    const menu = document.getElementById("dropdown");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

/* RENDER */
function renderScreen() {
    app.className = "grid " + sizeMode;
    app.innerHTML = "";

    screens[currentScreen].forEach((btn, index) => {
        const div = document.createElement("div");
        div.className = "button " + currentScreen;

        div.innerHTML = `
            <div class="emoji">${btn.emoji || "➕"}</div>
            <div class="label">${btn.label}</div>
        `;

        div.onclick = () => {
            if (btn.action) {
                currentScreen = btn.action;
                renderScreen();
            } else if (btn.speech) {
                speak(btn.speech);
            }
        };

        let pressTimer;

        div.addEventListener("touchstart", () => {
            if (!editMode) return;
            pressTimer = setTimeout(() => editButton(currentScreen, index), 600);
        });

        div.addEventListener("touchend", () => clearTimeout(pressTimer));

        app.appendChild(div);
    });
}

/* SPEECH */
function speak(text) {
    if (!text) return;
    speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

/* EDIT */
function editButton(screen, index) {
    const btn = screens[screen][index];

    btn.label = prompt("Label:", btn.label) || btn.label;
    btn.speech = prompt("Speech:", btn.speech || "") || btn.speech;
    btn.emoji = prompt("Emoji:", btn.emoji || "➕") || btn.emoji;

    saveData();
    renderScreen();
}

/* SETTINGS */
function toggleEdit() {
    const pass = prompt("PIN:");
    if (pass === PASSWORD) editMode = !editMode;
}

function changePin() {
    const current = prompt("Current PIN:");
    if (current !== PASSWORD) return;
    PASSWORD = prompt("New PIN:");
    localStorage.setItem("aacPin", PASSWORD);
}

function resetApp() {
    const pass = prompt("PIN:");
    if (pass !== PASSWORD) return;
    localStorage.removeItem("aacData");
    location.reload();
}

function toggleSize() {
    sizeMode = sizeMode === "normal" ? "big" : "normal";
    localStorage.setItem("sizeMode", sizeMode);
    renderScreen();
}

/* SAVE */
function saveData() {
    localStorage.setItem("aacData", JSON.stringify(screens));
}

renderScreen();

</script>

</body>
</html>
